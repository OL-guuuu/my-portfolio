<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Designer's Workspace</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- Opening Desk Scene (Scene 2) - Static Foundation -->
    <main class="opening-desk-scene" role="main">
        <div class="workspace">
            <!-- Desk Surface -->
            <div class="desk">
                <!-- 3 Monitors (Left, Center Portal, Right) -->
                <div class="monitors">
                    <!-- Left Monitor (Secondary) -->
                    <div class="monitor monitor--left">
                        <div class="monitor__bezel">
                            <div class="monitor__screen"></div>
                        </div>
                        <div class="monitor__body"></div>
                        <div class="monitor__stand"></div>
                    </div>

                    <!-- Center Monitor (Portal - Primary Focal Point) -->
                    <div class="monitor monitor--center monitor--portal">
                        <div class="monitor__bezel">
                            <div class="monitor__screen"></div>
                        </div>
                        <div class="monitor__body"></div>
                        <div class="monitor__stand"></div>
                    </div>

                    <!-- Right Monitor (Secondary) -->
                    <div class="monitor monitor--right">
                        <div class="monitor__bezel">
                            <div class="monitor__screen"></div>
                        </div>
                        <div class="monitor__body"></div>
                        <div class="monitor__stand"></div>
                    </div>
                </div>

                <!-- Desk Items (Minimal) -->
                <div class="desk-items">
                    <div class="keyboard"></div>
                    <div class="mouse"></div>
                </div>
            </div>

            <!-- Subtle Room Context -->
            <div class="room-context" aria-hidden="true">
                <div class="wall"></div>
            </div>
        </div>
    </main>
</body>
</html>
