<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Designer's Workspace</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header class="hero" role="banner">
        <div class="hero__container">
            <!-- Left text zone -->
            <div class="hero__text-zone">
                <p class="hero__role">UX/UI & Product Designer</p>
                <h1 class="hero__headline">Understanding your users, designing your success.</h1>
                <p class="hero__supporting">Powered by AI-driven insight, product thinking, and user-centered design.</p>
            </div>

            <!-- Right monitor zone -->
            <div class="hero__monitor-zone">
                <div class="monitor">
                    <div class="monitor__bezel">
                        <div class="monitor__screen"></div>
                    </div>
                    <div class="monitor__body"></div>
                    <div class="monitor__stand"></div>
                </div>
                <div class="desk"></div>
            </div>
        </div>
    </header>
</body>
</html>
