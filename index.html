<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Designer's Workspace</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- Opening Desk Scene (Scene 2) - Static Foundation -->
    <main class="opening-desk-scene" role="main">
        <div class="workspace">
            <!-- Desk Surface -->
            <div class="desk">
                <!-- 3 Monitors (Left, Center Portal, Right) -->
                <div class="monitors">
                    <!-- Left Monitor (Secondary) -->
                    <div class="monitor monitor--left">
                        <div class="monitor__bezel">
                            <div class="monitor__screen"></div>
                        </div>
                        <div class="monitor__body"></div>
                        <div class="monitor__stand"></div>
                    </div>

                    <!-- Center Monitor (Portal - Primary Focal Point) -->
                    <div class="monitor monitor--center monitor--portal">
                        <div class="monitor__bezel">
                            <div class="monitor__screen"></div>
                        </div>
                        <div class="monitor__body"></div>
                        <div class="monitor__stand"></div>
                    </div>

                    <!-- Right Monitor (Secondary) -->
                    <div class="monitor monitor--right">
                        <div class="monitor__bezel">
                            <div class="monitor__screen"></div>
                        </div>
                        <div class="monitor__body"></div>
                        <div class="monitor__stand"></div>
                    </div>
                </div>

                <!-- Desk Items (Minimal) -->
                <div class="desk-items">
                    <div class="keyboard"></div>
                    <div class="mouse"></div>
                </div>
            </div>

            <!-- Subtle Room Context -->
            <div class="room-context" aria-hidden="true">
                <div class="wall"></div>
            </div>
        </div>
    </main>

    <!-- Identity Hero Scene (Scene 3) - Static Foundation -->
    <section class="identity-hero-scene" role="region" aria-labelledby="identity-headline">
        <!-- Monitor Bezel Framing -->
        <div class="monitor-bezel-frame" aria-hidden="true"></div>

        <!-- Identity Content Container -->
        <div class="identity-content">
            <!-- Upper Identity Cluster -->
            <div class="identity-cluster">
                <!-- Personal Logo -->
                <div class="personal-logo" aria-label="Personal brand logo">
                    <!-- SVG Logo Placeholder - Replace with actual logo in implementation -->
                    <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <circle cx="40" cy="40" r="35" fill="none" stroke="#f5f5f5" stroke-width="2"/>
                        <path d="M30 40 L40 30 L50 40 L40 50 Z" fill="#f5f5f5"/>
                    </svg>
                </div>

                <!-- Personal Name -->
                <h2 class="personal-name">Your Name</h2>

                <!-- Role -->
                <p class="role">UX/UI &amp; Product Designer</p>
            </div>

            <!-- Primary Headline -->
            <h1 id="identity-headline" class="primary-headline">
                Understanding your users,<br>designing your success.
            </h1>

            <!-- Supporting Line -->
            <p class="supporting-line">
                Powered by AI-driven insight, product thinking, and user-centered design.
            </p>
        </div>
    </section>
</body>
</html>
